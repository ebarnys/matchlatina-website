<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — MatchLatin (concept)</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90' font-family='serif' fill='%23D4495F'>M</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F4F6F8; --panel:#FFFFFF; --navy:#102B3D; --navy2:#17384D; --ink:#102B3D;
      --muted:#52616E; --light:#94A0AA; --line:#E5E9ED;
      --coral:#D4495F; --coral-l:#F07A8A; --green:#1E8A4C;
      --serif:'Lilita One',Georgia,serif; --sans:'Montserrat',-apple-system,sans-serif; --t:0.2s ease;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.5;}
    button,input,select,textarea{font-family:inherit;}
    a{color:inherit;text-decoration:none;}
    ::-webkit-scrollbar{width:10px;height:10px;} ::-webkit-scrollbar-thumb{background:#d5dbe0;border-radius:6px;}

    /* LOGIN */
    .login{position:fixed;inset:0;z-index:100;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:24px;}
    .login__card{background:var(--panel);border-radius:20px;padding:44px 40px;width:100%;max-width:380px;box-shadow:0 24px 80px rgba(0,0,0,0.3);}
    .login__logo{font-family:var(--serif);font-size:26px;color:var(--coral);text-align:center;}
    .login__logo span{color:var(--navy);}
    .login__sub{text-align:center;font-size:13px;color:var(--light);margin:2px 0 28px;}
    .fld{margin-bottom:16px;}
    .fld label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;}
    .fld input{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;outline:none;}
    .fld input:focus{border-color:var(--coral);}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;border-radius:10px;font-weight:700;transition:all var(--t);}
    .btn--primary{background:var(--coral);color:#fff;padding:13px 20px;font-size:14px;width:100%;}
    .btn--primary:hover{background:var(--coral-l);}
    .login__demo{text-align:center;font-size:11px;color:var(--light);margin-top:16px;}

    /* SHELL */
    .app{display:none;}
    .app.on{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
    .side{background:var(--navy);color:#fff;padding:18px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
    .side__logo{font-family:var(--serif);font-size:20px;color:#fff;padding:8px 10px 18px;}
    .side__logo span{color:var(--coral-l);}
    .navi{display:flex;flex-direction:column;gap:2px;}
    .navi a{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;font-size:13.5px;font-weight:500;color:rgba(255,255,255,0.72);cursor:pointer;transition:all var(--t);}
    .navi a svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
    .navi a:hover{background:rgba(255,255,255,0.07);color:#fff;}
    .navi a.active{background:var(--coral);color:#fff;}
    .navi .navi__badge{margin-left:auto;background:rgba(255,255,255,0.18);font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;}
    .navi a.active .navi__badge{background:rgba(255,255,255,0.25);}
    .navi__sep{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:rgba(255,255,255,0.35);padding:16px 12px 6px;font-weight:700;}

    .main{min-width:0;}
    .topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:20;}
    .topbar__title{font-weight:700;font-size:14px;color:var(--muted);}
    .topbar__user{margin-left:auto;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;}
    .topbar__avatar{width:30px;height:30px;border-radius:50%;background:var(--coral);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
    .topbar__logout{color:var(--light);font-size:12px;cursor:pointer;margin-left:4px;}
    .topbar__logout:hover{color:var(--coral);}
    .content{padding:26px 24px 60px;}

    .page-h{font-family:var(--serif);font-size:24px;margin-bottom:2px;}
    .page-sub{font-size:13px;color:var(--muted);margin-bottom:22px;}

    /* stats */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
    .stat__n{font-family:var(--serif);font-size:26px;line-height:1;}
    .stat__l{font-size:12px;color:var(--light);margin-top:6px;}
    .stat--accent .stat__n{color:var(--coral);}
    .stat__d{font-size:11px;color:var(--green);margin-top:4px;font-weight:600;}

    /* generic card */
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:16px;}
    .card h3{font-family:var(--serif);font-size:16px;margin-bottom:14px;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}

    /* toolbar */
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
    .toolbar select,.toolbar input{padding:9px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:13px;background:var(--panel);outline:none;}
    .toolbar input{flex:1;min-width:160px;}
    .toolbar select:focus,.toolbar input:focus{border-color:var(--coral);}
    .toolbar .count{margin-left:auto;font-size:13px;color:var(--muted);}
    .btn--add{background:var(--coral);color:#fff;padding:9px 16px;font-size:13px;}
    .btn--add:hover{background:var(--coral-l);}

    /* table */
    .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
    table{width:100%;border-collapse:collapse;}
    th{font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:var(--light);text-align:left;padding:13px 18px;border-bottom:1px solid var(--line);font-weight:700;}
    td{padding:13px 18px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;}
    tr:last-child td{border-bottom:none;}
    tbody tr.clickable{cursor:pointer;transition:background var(--t);}
    tbody tr.clickable:hover{background:#FBF0F3;}
    .strong{font-weight:700;color:var(--ink);}
    .sub{font-size:12px;color:var(--light);}
    .pill{display:inline-block;font-size:11px;font-weight:700;padding:4px 11px;border-radius:20px;white-space:nowrap;}
    .s-new{background:rgba(212,73,95,0.14);color:#C0324B;}
    .s-contacted{background:rgba(29,155,240,0.14);color:#1477B8;}
    .s-followup{background:rgba(230,160,40,0.16);color:#A76B10;}
    .s-interested{background:rgba(39,174,96,0.15);color:#1E8A4C;}
    .s-offer{background:rgba(120,80,200,0.14);color:#6A3FB0;}
    .s-won{background:rgba(39,174,96,0.2);color:#137A3D;}
    .s-lost{background:rgba(120,130,140,0.15);color:#5A6570;}
    .s-published{background:rgba(39,174,96,0.15);color:#1E8A4C;}
    .s-verified{background:rgba(29,155,240,0.14);color:#1477B8;}
    .s-applicant{background:rgba(230,160,40,0.16);color:#A76B10;}
    .s-paused{background:rgba(120,130,140,0.15);color:#5A6570;}
    .s-paid{background:rgba(39,174,96,0.2);color:#137A3D;}
    .s-deposit{background:rgba(230,160,40,0.16);color:#A76B10;}
    .s-active{background:rgba(39,174,96,0.15);color:#1E8A4C;}
    .type-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--muted);}
    .type-badge .dot{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;background:rgba(16,43,61,0.06);}
    .ref-tag{display:inline-block;font-size:11px;font-weight:700;background:rgba(212,73,95,0.12);color:var(--coral);padding:2px 8px;border-radius:8px;}
    .empty{padding:44px;text-align:center;color:var(--light);font-size:14px;}
    .muted-date{font-size:12px;color:var(--light);}
    .idcell{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--light);font-weight:600;width:52px;}
    th.idcol{width:52px;}
    .newdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--coral);vertical-align:middle;margin-left:4px;box-shadow:0 0 0 3px rgba(212,73,95,0.18);}
    .dupwarn{font-size:11px;color:#A76B10;font-weight:600;margin-top:3px;}
    .ichips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:3px;}
    .ichip{font-size:11px;font-weight:600;background:#EEF1F4;color:var(--muted);padding:2px 8px;border-radius:8px;}
    .ichip.more{background:rgba(212,73,95,0.12);color:var(--coral);}
    .dupbanner{background:rgba(230,160,40,0.12);border:1px solid rgba(230,160,40,0.35);color:#8A5A10;border-radius:12px;padding:12px 14px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .dupmerge{margin-left:auto;background:#fff;border:1.5px solid rgba(230,160,40,0.5);color:#8A5A10;font-weight:700;font-size:12px;padding:6px 12px;border-radius:8px;cursor:pointer;}
    .tlist{display:flex;flex-direction:column;gap:2px;}
    .tl{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
    .tl:last-child{border-bottom:none;}
    .tl__ic{width:30px;height:30px;border-radius:8px;background:#EEF1F4;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
    .tl__t{font-size:13.5px;color:var(--ink);}
    .tl__d{font-size:11px;color:var(--light);margin-top:2px;}

    /* women grid */
    .wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
    .wcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform var(--t),box-shadow var(--t);}
    .wcard:hover{transform:translateY(-3px);box-shadow:0 10px 26px rgba(0,0,0,0.1);}
    .wcard__img{aspect-ratio:1/1;overflow:hidden;position:relative;background:#000;}
    .wcard__img img{width:100%;height:100%;object-fit:cover;}
    .wcard__st{position:absolute;top:8px;left:8px;}
    .wcard__b{padding:10px 12px;}
    .wcard__n{font-weight:700;font-size:14px;}
    .wcard__c{font-size:12px;color:var(--light);}

    /* woman detail page */
    .backlink{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--coral);cursor:pointer;margin-bottom:14px;}
    .backlink:hover{text-decoration:underline;}
    .wp-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:22px;}
    .wform-grid{display:grid;grid-template-columns:320px 1fr;gap:22px;align-items:start;}
    .photo-main{border-radius:12px;overflow:hidden;position:relative;margin-bottom:12px;background:#000;}
    .photo-main img{width:100%;aspect-ratio:3/4;object-fit:cover;display:block;}
    .photo-thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .pth{position:relative;border-radius:9px;overflow:hidden;aspect-ratio:1/1;border:2px solid transparent;cursor:pointer;}
    .pth.primary{border-color:var(--coral);}
    .pth img{width:100%;height:100%;object-fit:cover;}
    .pth-x{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:6px;background:rgba(16,43,61,0.75);color:#fff;border:none;font-size:13px;cursor:pointer;line-height:1;}
    .pth-tag{position:absolute;bottom:3px;left:3px;background:var(--coral);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:6px;}
    .pth-add{display:flex;align-items:center;justify-content:center;aspect-ratio:1/1;border:2px dashed var(--line);border-radius:9px;color:var(--light);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
    .pth-add:hover{border-color:var(--coral);color:var(--coral);}
    .flabel{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 6px;}
    .finput{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;outline:none;margin-bottom:14px;background:#fff;color:var(--ink);}
    .finput:focus{border-color:var(--coral);}
    textarea.finput{min-height:90px;line-height:1.6;resize:vertical;}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .save-bar{display:flex;gap:10px;margin-top:4px;}
    @media (max-width:800px){.wform-grid{grid-template-columns:1fr;}}

    /* funnel */
    .funnel{display:flex;flex-direction:column;gap:8px;}
    .fbar{display:flex;align-items:center;gap:12px;}
    .fbar__l{width:96px;font-size:12px;color:var(--muted);}
    .fbar__track{flex:1;background:#EEF1F4;border-radius:6px;height:22px;overflow:hidden;}
    .fbar__fill{height:100%;background:var(--coral);border-radius:6px;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:11px;font-weight:700;}
    .list-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px;}
    .list-row:last-child{border-bottom:none;}
    .list-row .r-main{flex:1;}
    .list-row .r-strong{font-weight:600;}
    .mini-bar{width:90px;height:6px;background:#EEF1F4;border-radius:4px;overflow:hidden;}
    .mini-bar span{display:block;height:100%;background:var(--coral);}

    /* drawer */
    .scrim{position:fixed;inset:0;background:rgba(16,43,61,0.4);z-index:40;opacity:0;pointer-events:none;transition:opacity var(--t);}
    .scrim.on{opacity:1;pointer-events:auto;}
    .drawer{position:fixed;top:0;right:0;height:100%;width:500px;max-width:94vw;background:var(--bg);z-index:50;box-shadow:-16px 0 48px rgba(0,0,0,0.18);transform:translateX(100%);transition:transform 0.28s ease;overflow-y:auto;}
    .drawer.on{transform:translateX(0);}
    .dr-head{background:var(--navy);color:#fff;padding:20px 22px;position:sticky;top:0;z-index:2;}
    .dr-close{position:absolute;top:15px;right:16px;background:rgba(255,255,255,0.12);border:none;color:#fff;width:30px;height:30px;border-radius:8px;font-size:18px;cursor:pointer;}
    .dr-close:hover{background:rgba(255,255,255,0.25);}
    .dr-name{font-family:var(--serif);font-size:22px;}
    .dr-sub{font-size:13px;color:rgba(255,255,255,0.6);margin-top:2px;}
    .dr-body{padding:20px 22px;}
    .dcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
    .dcard h4{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--light);margin-bottom:12px;font-weight:700;}
    .kv{display:flex;justify-content:space-between;gap:12px;padding:6px 0;font-size:13.5px;border-bottom:1px solid var(--line);}
    .kv:last-child{border-bottom:none;}
    .kv .k{color:var(--muted);} .kv .v{color:var(--ink);font-weight:600;text-align:right;}
    .kv .v a{color:var(--coral);}
    .msg-quote{background:#FBF0F3;border-left:3px solid var(--coral);border-radius:0 10px 10px 0;padding:11px 13px;font-size:13px;color:var(--muted);font-style:italic;line-height:1.6;}
    .actions{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
    .act{display:flex;flex-direction:column;align-items:center;gap:5px;padding:12px 6px;border-radius:11px;border:1.5px solid var(--line);background:var(--panel);cursor:pointer;font-size:12px;font-weight:600;transition:all var(--t);}
    .act:hover{border-color:var(--coral);color:var(--coral);}
    .act svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
    .act--wa:hover{border-color:#25D366;color:#128C4B;}
    .status-row{display:flex;flex-wrap:wrap;gap:6px;}
    .status-opt{font-size:12px;font-weight:600;padding:6px 11px;border-radius:20px;border:1.5px solid var(--line);background:var(--panel);color:var(--muted);cursor:pointer;transition:all var(--t);}
    .status-opt:hover{border-color:var(--coral);}
    .status-opt.active{background:var(--navy);color:#fff;border-color:var(--navy);}
    .note{padding:11px 0;border-bottom:1px solid var(--line);font-size:13px;}
    .note:last-child{border-bottom:none;}
    .note__meta{font-size:11px;color:var(--light);margin-bottom:3px;}
    .note-add{display:flex;gap:8px;margin-top:10px;}
    .note-add textarea{flex:1;padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;outline:none;resize:vertical;min-height:36px;}
    .btn--sm{background:var(--coral);color:#fff;padding:0 15px;font-size:13px;border-radius:10px;}

    /* modal */
    .modal-scrim{position:fixed;inset:0;background:rgba(16,43,61,0.55);z-index:60;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
    .modal-scrim.on{display:flex;}
    .modal{background:var(--panel);border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,0.25);}
    .modal__head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
    .modal__head h3{font-family:var(--serif);font-size:19px;}
    .modal__head button{background:none;border:none;font-size:22px;color:var(--light);cursor:pointer;}
    .modal__body{padding:20px 22px;}
    .modal__body label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:14px 0 6px;}
    .modal__body label:first-child{margin-top:0;}
    .modal__body select,.modal__body input,.modal__body textarea{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;outline:none;}
    .modal__body textarea{min-height:200px;line-height:1.6;resize:vertical;}
    .modal__foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px;}
    .btn--ghost{background:none;border:1.5px solid var(--line);color:var(--muted);padding:10px 16px;font-size:13px;}
    .btn--send{background:var(--coral);color:#fff;padding:10px 20px;font-size:13px;}
    .btn--send:hover{background:var(--coral-l);}

    .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:10px;font-size:13.5px;font-weight:500;opacity:0;pointer-events:none;transition:all var(--t);z-index:90;}
    .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

    @media (max-width:900px){
      .app.on{grid-template-columns:1fr;}
      .side{position:static;height:auto;display:flex;gap:6px;overflow-x:auto;padding:10px;}
      .side__logo{display:none;} .navi{flex-direction:row;gap:4px;} .navi__sep{display:none;} .navi__badge{display:none;}
      .navi a{white-space:nowrap;padding:8px 12px;}
      .stats{grid-template-columns:1fr 1fr;} .grid2{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login__card">
    <div class="login__logo">Match<span>Latin</span></div>
    <div class="login__sub">Admin · concept</div>
    <div class="fld"><label>Email</label><input type="email" value="owner@matchlatin.com"></div>
    <div class="fld"><label>Password</label><input type="password" value="demo1234"></div>
    <button class="btn btn--primary" id="signIn">Sign in →</button>
    <div class="login__demo">🔒 Concept clickdummy — no real data</div>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <aside class="side">
    <div class="side__logo">Match<span>Latin</span></div>

        <div class="card"><h3>Email sender</h3>
          <label class="sub">From name</label><input class="setinp" value="Carlos — MatchLatin">
          <label class="sub">From email</label><input class="setinp" value="carlos@matchlatin.com"></div>
        <div class="card"><h3>Affiliate</h3>
          <label class="sub">Starter commission (%)</label><input class="setinp" value="12">
          <label class="sub">Payout schedule</label><input class="setinp" value="Every 2 weeks"></div>
      </div>
      <button class="btn btn--add" onclick="toast('Settings saved (demo)')">Save settings</button>
      <style>.setinp{width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:9px;font-size:13.5px;margin:4px 0 12px;outline:none;} .setinp:focus{border-color:var(--coral);} .card label.sub{display:block;font-weight:600;color:var(--muted);}</style>`;
  }

  /* ── EMAIL MODAL (from lead) ── */
  function emailModal(l,refresh){
    const opts=TEMPLATES.filter(t=>t.ch==='Email');
    const primaryTour=(l.acts.find(a=>a.type==='tour')||{}).label||'your tour';
    const fill=(t)=>({subj:t.subj,body:t.body.replace(/{name}/g,l.name.split(' ')[0]).replace(/{tour}/g,primaryTour)});
    let cur=fill(opts[0]);
    $('#modal').innerHTML=`<div class="modal"><div class="modal__head"><h3>Send email</h3><button onclick="closeModal()">×</button></div>
      <div class="modal__body">
        <label>Template</label><select id="etpl">${opts.map((t,i)=>`<option value="${i}">${t.name}</option>`).join('')}</select>
        <label>To</label><input value="${l.email}" readonly>
        <label>Subject</label><input id="esubj" value="${cur.subj.replace(/"/g,'&quot;')}">
        <label>Message</label><textarea id="ebody">${cur.body}</textarea></div>
      <div class="modal__foot"><button class="btn btn--ghost" onclick="closeModal()">Cancel</button><button class="btn btn--send" id="esend">Send email →</button></div></div>`;
    $('#modal').classList.add('on');
    $('#etpl').addEventListener('change',e=>{const c=fill(opts[+e.target.value]);$('#esubj').value=c.subj;$('#ebody').value=c.body;});
    $('#esend').addEventListener('click',()=>{closeModal();l.notes.unshift({m:'Just now · Carlos',b:'📧 Sent email: "'+$('#esubj').value+'"'});if(['new','contacted','interested'].includes(l.status))l.status='offer';refresh&&refresh();updateBadges();openLead(l.id,refresh);toast('Email sent ✓');});
  }
  window.closeModal=()=>$('#modal').classList.remove('on');
  $('#modal').addEventListener('click',e=>{if(e.target===$('#modal'))closeModal();});

  /* ── BADGES ── */
  function updateBadges(){
    $('#badgeLeads').textContent=LEADS.filter(l=>l.status==='new').length;
    $('#badgeWomen').textContent=WOMEN.filter(w=>w.status==='applicant').length;
  }

  const RENDER={dashboard,leads,customers,women,tours,affiliates,templates,users,settings};
  updateBadges();
  dashboard();
</script>
</body>
</html>
